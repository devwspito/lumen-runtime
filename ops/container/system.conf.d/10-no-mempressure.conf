# podman-machine (macOS) compat: systemd's per-unit MemoryPressureWatch binds the unit's
# cgroup memory.pressure into its mount namespace. In the Mac podman VM's cgroup view that
# fails "Permission denied" → 226/NAMESPACE → every hardened unit (hermes-runtime, the
# browser netns, …) crash-loops, even with a rootful machine. It is a minor memory-pressure
# NOTIFICATION feature, NOT part of the cage (netns/nftables/Landlock/seccomp/uid-split are
# all independent of it). Turning it off lets the units' namespace setup succeed. Linux
# deploys are functionally unaffected.
[Manager]
DefaultMemoryPressureWatch=off
